<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Main diagonal gradient: orange bottom-left → red center → blue top-right -->
    <linearGradient id="mainGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="40%" stop-color="#E8291C"/>
      <stop offset="100%" stop-color="#4D7FFF"/>
    </linearGradient>
    <!-- Secondary gradient for depth on i stem -->
    <linearGradient id="iGrad" x1="0%" y1="100%" x2="80%" y2="0%">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="50%" stop-color="#E8291C"/>
      <stop offset="100%" stop-color="#5B8DFF"/>
    </linearGradient>
    <!-- Dot gradient -->
    <linearGradient id="dotGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B00"/>
      <stop offset="50%" stop-color="#E8291C"/>
      <stop offset="100%" stop-color="#4D7FFF"/>
    </linearGradient>
  </defs>

  <!-- Black background -->
  <rect width="500" height="500" fill="#000000"/>

  <!-- 
    Layout: 
    i: dot (rounded square) at top + vertical stem below
    N: classic capital N to the right of i
    
    Combined bounding box centered in 500x500:
    Total width: ~240px, Total height: ~300px
    Starting x: ~130, Starting y: ~100
  -->

  <!-- i dot (rounded square) -->
  <rect x="130" y="100" width="78" height="78" rx="20" ry="20" fill="url(#dotGrad)"/>

  <!-- i stem (vertical bar) -->
  <rect x="130" y="198" width="78" height="202" fill="url(#iGrad)"/>

  <!-- N letter:
    Left vertical bar: x=228..290, y=198..400
    Right vertical bar: x=340..402, y=198..400
    Diagonal: from top-left corner to bottom-right corner
  -->
  <!-- N left bar -->
  <rect x="228" y="198" width="62" height="202" fill="url(#mainGrad)"/>

  <!-- N right bar -->
  <rect x="340" y="198" width="62" height="202" fill="url(#mainGrad)"/>

  <!-- N diagonal bar (parallelogram) -->
  <!-- From top-right of left bar (290, 198) to bottom-left of right bar (340, 400) -->
  <polygon points="228,198 290,198 402,400 340,400" fill="url(#mainGrad)"/>

</svg>
